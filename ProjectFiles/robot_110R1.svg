<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Robot de soldadura - Vista lateral (gun izquierda, base derecha) -->

  <!-- === BASE CIRCULAR (derecha) === -->
  <path d="M270,45 L275,40 L285,35 L295,30 L310,28 L325,28 L340,30
           L350,35 L358,40 L365,50 L368,60 L370,75 L370,95 L370,110
           L368,120 L365,130 L358,140 L350,148 L340,152 L325,155
           L310,155 L295,152 L285,148 L275,140 L270,130 L268,120
           L265,110 L265,95 L265,75 L268,60 Z"
        fill="#E87A1E" stroke="#333" stroke-width="2"/>
  <ellipse cx="318" cy="92" rx="38" ry="48" fill="#E87A1E" stroke="#333" stroke-width="2"/>
  <ellipse cx="318" cy="92" rx="30" ry="38" fill="#D4700A" stroke="#333" stroke-width="1.5"/>
  <!-- Salientes base -->
  <rect x="355" y="55" width="18" height="14" rx="2" fill="#E87A1E" stroke="#333" stroke-width="1.5"/>
  <rect x="355" y="115" width="18" height="14" rx="2" fill="#E87A1E" stroke="#333" stroke-width="1.5"/>
  <rect x="370" y="40" width="14" height="12" rx="2" fill="#E87A1E" stroke="#333" stroke-width="1"/>
  <rect x="370" y="135" width="14" height="12" rx="2" fill="#E87A1E" stroke="#333" stroke-width="1"/>
  <!-- Líneas de la base -->
  <line x1="290" y1="60" x2="345" y2="125" stroke="#333" stroke-width="0.8"/>
  <line x1="345" y1="60" x2="290" y2="125" stroke="#333" stroke-width="0.8"/>

  <!-- === BRAZO HORIZONTAL === -->
  <path d="M265,68 L160,68 L155,63 L148,60 L140,58 L132,60 L128,65
           L120,68 L115,72 L108,72 L100,68 L95,65 L88,65
           L82,68 L80,72 L80,110 L82,115 L88,118 L95,118
           L100,115 L108,112 L115,112 L120,115 L128,118
           L132,122 L140,125 L148,122 L155,120 L160,115
           L265,115 Z"
        fill="#E87A1E" stroke="#333" stroke-width="2"/>
  <!-- Detalles mecánicos brazo -->
  <rect x="165" y="75" width="40" height="16" rx="2" fill="#D4700A" stroke="#333" stroke-width="1"/>
  <rect x="170" y="78" width="12" height="10" rx="1" fill="#C06010" stroke="#333" stroke-width="0.8"/>
  <rect x="188" y="78" width="12" height="10" rx="1" fill="#C06010" stroke="#333" stroke-width="0.8"/>
  <!-- Tornillos -->
  <circle cx="220" cy="80" r="1.5" fill="#333"/><circle cx="230" cy="80" r="1.5" fill="#333"/>
  <circle cx="220" cy="105" r="1.5" fill="#333"/><circle cx="230" cy="105" r="1.5" fill="#333"/>
  <!-- Líneas detalle -->
  <line x1="160" y1="78" x2="260" y2="78" stroke="#C06010" stroke-width="0.8"/>
  <line x1="160" y1="85" x2="260" y2="85" stroke="#C06010" stroke-width="0.8"/>
  <line x1="160" y1="105" x2="260" y2="105" stroke="#C06010" stroke-width="1"/>

  <!-- === GUN HOLDER / PINZA (amarillo, izquierda) === -->
  <path d="M80,72 L45,72 L40,68 L35,62 L30,55 L28,48 L30,42 L35,38
           L40,35 L45,33 L50,35 L50,55
           L45,55 L42,60 L42,68 L45,72
           M80,112 L45,112 L40,115 L35,120 L30,128 L28,135 L30,140 L35,145
           L40,148 L45,150 L50,148 L50,128
           L45,128 L42,122 L42,115 L45,112"
        fill="#D4C800" stroke="#555" stroke-width="2"/>
  
  <!-- Barra vertical de la pinza -->
  <rect x="28" y="48" width="8" height="88" rx="1" fill="#D4C800" stroke="#555" stroke-width="2"/>
  
  <!-- Barra horizontal superior pinza -->
  <rect x="15" y="35" width="30" height="8" rx="1" fill="#D4C800" stroke="#555" stroke-width="1.5"/>
  <!-- Barra horizontal inferior pinza -->
  <rect x="15" y="142" width="30" height="8" rx="1" fill="#D4C800" stroke="#555" stroke-width="1.5"/>
</svg>
